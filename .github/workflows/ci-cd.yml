name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fraud-detection-api

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/app/ --ignore=E402,F401
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g prettier
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: pip install pytest httpx
      - run: python -m pytest backend/tests/ -v || echo "No tests yet"

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest -f backend/Dockerfile .
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ubuntu
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          rsync -avz --exclude 'node_modules' --exclude '.git' ./ $USER@$HOST:~/fraud-detection/
          ssh -o StrictHostKeyChecking=no $USER@$HOST << 'EOF'
            cd ~/fraud-detection
            docker compose -f infra/docker-compose.yml down
            docker compose -f infra/docker-compose.yml up -d --build
          EOF
