# Kubernetes deployment for fraud detection platform
# Requires: PostgreSQL, Redis already provisioned externally

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api
  labels: { app: fraud-api }
spec:
  replicas: 3
  selector:
    matchLabels: { app: fraud-api }
  template:
    metadata:
      labels: { app: fraud-api }
    spec:
      containers:
      - name: api
        image: fraud-detection-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef: { name: db-secret, key: url }
        - name: REDIS_URL
          valueFrom:
            secretKeyRef: { name: redis-secret, key: url }
        resources:
          limits: { cpu: "1", memory: "2Gi" }
          requests: { cpu: "500m", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-api-service
spec:
  selector: { app: fraud-api }
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-frontend
  labels: { app: fraud-frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: fraud-frontend }
  template:
    metadata:
      labels: { app: fraud-frontend }
    spec:
      containers:
      - name: frontend
        image: fraud-detection-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-frontend-service
spec:
  selector: { app: fraud-frontend }
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
